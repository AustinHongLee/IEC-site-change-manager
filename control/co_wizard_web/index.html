<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>智源工程・修改單系統</title>
<style>
  :root{
    --brand:#1860ab;
    --brand-strong:#0f4c8c;
    --brand-deep:#0c2f5e;
    --brand-soft:#eef4fc;
    --ink:#101a2e;
    --text:#33425c;
    --muted:#6b7a92;
    --line:#e6ecf5;
    --line-strong:#cfd9e8;
    --surface:#ffffff;
    --page:#eceef3;
    --ok:#157a47;
    --warn:#a85d00;
    --danger:#b42318;
    --shadow:0 1px 2px rgba(16,26,46,.05), 0 18px 44px rgba(16,40,80,.12);
    --shadow-sm:0 1px 3px rgba(20,40,80,.05), 0 14px 32px rgba(20,40,80,.10);
  }
  *{box-sizing:border-box;}
  button,input,select,.nav-step,tr.pick,.sheet,.pill{transition:background-color .16s ease,border-color .16s ease,color .16s ease,box-shadow .16s ease,transform .14s ease;}
  html,body{height:100%;}
  body{
    margin:0;
    color:var(--text);
    background:var(--page);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","Microsoft JhengHei",system-ui,sans-serif;
    font-size:14px;
    line-height:1.45;
    letter-spacing:0;
  }
  button,input,select{font:inherit;letter-spacing:0;}
  button{
    border:1px solid var(--line-strong);
    border-radius:11px;
    background:#fff;
    color:var(--text);
    min-height:40px;
    padding:8px 15px;
    cursor:pointer;
  }
  button:hover{border-color:var(--brand);color:var(--brand);box-shadow:0 4px 12px rgba(24,96,171,.16);transform:translateY(-1px);}
  button:active{transform:translateY(0) scale(.99);box-shadow:none;}
  button.primary{background:linear-gradient(180deg,#2c74bf,var(--brand));border-color:var(--brand-strong);color:#fff;box-shadow:0 2px 8px rgba(24,96,171,.30);}
  button.primary:hover{background:var(--brand-strong);color:#fff;box-shadow:0 8px 20px rgba(24,96,171,.38);transform:translateY(-1px);}
  button.ghost{background:transparent;color:var(--brand);border-color:rgba(24,96,171,.22);}
  button.sm{min-height:30px;padding:4px 10px;font-size:12px;}
  input,select{
    width:100%;
    min-height:40px;
    border:1px solid var(--line);
    border-radius:11px;
    background:#fff;
    color:var(--ink);
    padding:8px 10px;
    outline:none;
  }
  input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(24,96,171,.14);}
  label{display:block;margin:0 0 6px;color:var(--muted);font-size:12px;font-weight:600;}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;}
  th{color:var(--muted);font-size:12px;font-weight:700;white-space:nowrap;background:#f5f8fd;}
  td{font-size:13px;}
  code,.weld-code{display:inline-block;font-family:"Cascadia Mono","Consolas",monospace;color:var(--brand-strong);font-weight:800;background:var(--brand-soft);border:1px solid #d6e4f6;padding:2px 9px;border-radius:7px;letter-spacing:.02em;}
  .app{
    height:100vh;
    display:grid;
    grid-template-columns:276px minmax(0,1fr);
    overflow:hidden;
  }
  .side{
    display:flex;
    flex-direction:column;
    min-width:0;
    padding:24px 18px;
    color:#fff;
    position:relative;
    z-index:2;
    background:
      radial-gradient(130% 70% at 18% 0%, rgba(255,255,255,.12), transparent 58%),
      linear-gradient(168deg,#2575c6 0%,#14548f 46%,var(--brand-deep) 100%);
    box-shadow:6px 0 30px rgba(8,28,58,.24), inset -1px 0 0 rgba(255,255,255,.06);
  }
  .brand{
    display:flex;
    gap:12px;
    align-items:center;
    min-height:54px;
    margin-bottom:28px;
  }
  .brand-logo{
    width:54px;
    max-width:54px;
    height:54px;
    object-fit:contain;
    object-position:center;
    padding:5px;
    border-radius:14px;
    background:#fff;
    box-shadow:0 10px 26px rgba(4,20,45,.32);
  }
  .brand-mark-fallback{
    display:none;
    place-items:center;
    width:44px;
    height:44px;
    flex:0 0 44px;
    border:2px solid rgba(255,255,255,.72);
    border-radius:50%;
    font-weight:800;
  }
  .brand-text{min-width:0;}
  .brand-text strong{display:block;font-size:16px;line-height:1.3;}
  .brand-text span{display:block;margin-top:3px;font-size:12px;color:rgba(255,255,255,.76);}
  .step-nav{display:grid;gap:8px;}
  .nav-step{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    min-height:46px;
    padding:10px 12px;
    color:rgba(255,255,255,.86);
    background:transparent;
    border:1px solid transparent;
    border-radius:12px;
    text-align:left;
  }
  .nav-step:hover{color:#fff;background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.22);}
  .nav-step.active{color:var(--brand);background:#fff;border-color:#fff;box-shadow:0 10px 26px rgba(4,20,45,.30);}
  .nav-step .num{font-weight:800;}
  .side-meta{
    margin-top:auto;
    padding-top:18px;
    color:rgba(255,255,255,.78);
    font-size:12px;
    border-top:1px solid rgba(255,255,255,.2);
  }
  .workspace{
    min-width:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--page);
  }
  .topbar{
    min-height:66px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
    padding:0 28px;
    background:#fff;
    border-bottom:1px solid var(--line);
  }
  .topbar h1{margin:0;color:var(--ink);font-size:20px;font-weight:800;}
  .topbar small{display:block;margin-top:2px;color:var(--muted);font-size:12px;}
  .connection{
    display:inline-flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--warn);}
  .dot.ok{background:var(--ok);}
  .content{
    min-height:0;
    flex:1;
    overflow:auto;
    padding:28px;
  }
  .page{display:none;max-width:1160px;margin:0 auto;}
  .page.active{display:block;}
  .page-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:18px;
    margin-bottom:22px;
  }
  .page-head h2{margin:0;color:var(--ink);font-size:26px;font-weight:850;}
  .page-head p{margin:6px 0 0;color:var(--muted);}
  .sheet{
    background:var(--surface);
    border:1px solid rgba(20,40,80,.05);
    border-radius:18px;
    box-shadow:var(--shadow-sm);
  }
  .sheet.pad{padding:22px;}
  .section-line{
    padding:22px 0;
    border-top:1px solid var(--line);
  }
  .section-line:first-child{padding-top:0;border-top:0;}
  .section-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
  }
  .section-title h3{margin:0;color:var(--ink);font-size:16px;}
  .section-title span{color:var(--muted);font-size:12px;}
  .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:22px;}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
  .field-row{display:grid;grid-template-columns:1fr 190px;gap:14px;}
  .toolbar{
    display:flex;
    align-items:end;
    gap:10px;
    flex-wrap:wrap;
  }
  .toolbar .grow{flex:1 1 240px;}
  .pick-wrap{
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:#fff;
  }
  .pick-scroll{max-height:300px;overflow:auto;}
  tr.pick{cursor:pointer;}
  tr.pick:hover{background:var(--brand-soft);}
  tr.pick.selected{background:#dcecff;box-shadow:inset 3px 0 0 var(--brand);}
  .empty{
    padding:28px 16px;
    color:var(--muted);
    text-align:center;
  }
  .empty-illustration{
    width:132px;
    height:84px;
    margin:0 auto 14px;
    color:var(--brand);
  }
  .ghost-panel{
    min-height:340px;
    display:grid;
    place-items:center;
    padding:36px;
    background:linear-gradient(180deg,#fff,#f7fbff);
    border:1px dashed var(--line-strong);
    border-radius:10px;
  }
  .ghost-panel h3{margin:0 0 8px;color:var(--ink);font-size:20px;}
  .ghost-panel p{margin:0;color:var(--muted);}
  .statusbar{
    min-height:64px;
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 22px;
    background:#fff;
    border-top:1px solid var(--line);
    box-shadow:0 -10px 28px rgba(20,45,80,.07);
  }
  .status-text{flex:1;min-width:0;color:var(--muted);}
  .pill{
    display:inline-flex;
    align-items:center;
    min-height:26px;
    padding:2px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:800;
  }
  .pill.ok{color:var(--ok);background:rgba(22,135,80,.12);}
  .pill.warn{color:var(--warn);background:rgba(181,105,0,.12);}
  .missing{margin-left:10px;color:var(--warn);}
  @keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0);}50%{box-shadow:0 0 0 5px rgba(245,158,11,.32);}}
  .hint-pulse{animation:hintPulse 1.4s ease-in-out infinite;border-radius:11px;}
  #toast{
    position:fixed;
    right:24px;
    bottom:82px;
    z-index:5;
    display:none;
    max-width:460px;
    padding:12px 14px;
    color:#fff;
    background:var(--danger);
    border-radius:8px;
    box-shadow:0 14px 34px rgba(0,0,0,.22);
  }
  @media (max-width:900px){
    .app{grid-template-columns:1fr;}
    .side{height:auto;padding:14px 16px;}
    .brand{margin-bottom:12px;}
    .step-nav{grid-template-columns:repeat(4,minmax(0,1fr));}
    .nav-step{justify-content:center;padding:8px;font-size:12px;}
    .side-meta{display:none;}
    .workspace{height:calc(100vh - 154px);}
    .topbar{padding:0 18px;}
    .content{padding:18px;}
    .grid-2,.grid-3,.field-row{grid-template-columns:1fr;}
    .statusbar{flex-wrap:wrap;}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <img class="brand-logo" src="img/brand-logo.png" alt="" onerror="this.style.display='none';document.querySelector('.brand-mark-fallback').style.display='grid';">
      <div class="brand-mark-fallback">智</div>
      <div class="brand-text">
        <strong>智源工程・修改單系統</strong>
        <span>管線 / 鋼構 / 桶槽</span>
      </div>
    </div>

    <nav class="step-nav" aria-label="修改單步驟">
      <button class="nav-step active" type="button" data-page="basic"><span class="num">①</span><span>基本</span></button>
      <button class="nav-step" type="button" data-page="welds"><span class="num">②</span><span>焊口</span></button>
      <button class="nav-step" type="button" data-page="files"><span class="num">③</span><span>照片圖面</span></button>
      <button class="nav-step" type="button" data-page="materials"><span class="num">④</span><span>材料</span></button>
    </nav>

    <div class="side-meta" id="navStatus">圖號 — · 連線中</div>
  </aside>

  <section class="workspace">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">基本資料</h1>
        <small id="pageHint">建立修改單的圖號、日期與原因</small>
      </div>
      <div class="connection"><span class="dot" id="connDot"></span><span id="connectionText">連線中</span></div>
    </header>

    <main class="content">
      <section class="page active" id="page-basic">
        <div class="page-head">
          <div>
            <h2>基本資料</h2>
            <p>流水號就是圖號，後續焊口清單會用它查詢。</p>
          </div>
        </div>

        <div class="sheet pad">
          <div class="field-row">
            <div>
              <label for="series">流水號</label>
              <input id="series" autocomplete="off" placeholder="例：100">
            </div>
            <div>
              <label for="date">日期</label>
              <input id="date" autocomplete="off">
            </div>
          </div>
          <div class="section-line">
            <label for="reason">原因</label>
            <input id="reason" autocomplete="off" placeholder="例：現場管線干涉">
          </div>
          <div class="section-line">
            <button class="primary" type="button" id="loadBtn" onclick="loadWelds()">載入焊口</button>
            <button class="ghost" type="button" onclick="showPage('welds')">前往焊口</button>
          </div>
        </div>
      </section>

      <section class="page" id="page-welds">
        <div class="page-head">
          <div>
            <h2>焊口</h2>
            <p>既有焊口從來源清單選取，新焊口由系統編碼。</p>
          </div>
          <button class="primary" type="button" onclick="loadWelds()">重新載入焊口</button>
        </div>

        <div class="grid-2">
          <div class="sheet">
            <div class="section-line" style="padding:18px 18px 0">
              <div class="section-title">
                <h3>這張圖號的現有焊口</h3>
                <span id="weldCount">尚未載入</span>
              </div>
            </div>
            <div class="pick-wrap" style="margin:0 18px 18px">
              <div class="pick-scroll">
                <table>
                  <thead><tr><th>焊口號</th><th>尺寸</th><th>材質</th><th>厚度</th><th>型式</th></tr></thead>
                  <tbody id="pickList"><tr><td colspan="5" class="empty">先載入焊口</td></tr></tbody>
                </table>
              </div>
            </div>
            <div class="section-line" style="padding:18px">
              <div class="toolbar">
                <div class="grow">
                  <label for="exOp">操作</label>
                  <select id="exOp"><option>裁切</option><option selected>加長</option><option>縮短</option></select>
                </div>
                <button type="button" onclick="addExisting()">加入既有重焊</button>
              </div>
            </div>
          </div>

          <div class="sheet pad">
            <div class="section-title">
              <h3>新焊口</h3>
              <span>原圖沒有的焊口</span>
            </div>
            <div class="grid-3">
              <div>
                <label for="nwOp">操作</label>
                <select id="nwOp"><option>裁切</option><option selected>加長</option><option>縮短</option></select>
              </div>
              <div>
                <label for="nwSize">尺寸</label>
                <input id="nwSize" autocomplete="off">
              </div>
              <div>
                <label for="nwMat">材質</label>
                <input id="nwMat" autocomplete="off">
              </div>
            </div>
            <div class="grid-3" style="margin-top:14px">
              <div>
                <label for="nwSch">厚度</label>
                <input id="nwSch" autocomplete="off">
              </div>
              <div>
                <label for="nwType">型式</label>
                <input id="nwType" autocomplete="off">
              </div>
              <div style="display:flex;align-items:end">
                <button type="button" onclick="addNew()">加入新焊口</button>
              </div>
            </div>
          </div>
        </div>

        <div class="sheet" style="margin-top:22px">
          <div class="section-line" style="padding:18px 18px 0">
            <div class="section-title">
              <h3>本單焊口</h3>
              <span>編號與規格由後端重算</span>
            </div>
          </div>
          <table>
            <thead><tr><th>焊口碼</th><th>原始</th><th>操作</th><th>規格</th><th>來源</th><th></th></tr></thead>
            <tbody id="weldRows"><tr><td colspan="6" class="empty">尚未加入焊口</td></tr></tbody>
          </table>
        </div>
      </section>

      <section class="page" id="page-files">
        <div class="page-head">
          <div>
            <h2>照片圖面</h2>
            <p>修改前、修改後與圖面 PDF。</p>
          </div>
        </div>
        <div class="ghost-panel">
          <div>
            <div class="empty-illustration" aria-hidden="true">
              <svg viewBox="0 0 160 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="18" width="72" height="52" rx="8" stroke="currentColor" stroke-width="5"/>
                <path d="M28 62l17-18 15 13 10-10 13 15" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="68" cy="34" r="6" fill="currentColor"/>
                <path d="M103 22h31l12 12v40h-43V22z" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                <path d="M134 22v13h12" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3>下一刀補</h3>
            <p>照片與 PDF 輸入會接在這一頁。</p>
          </div>
        </div>
      </section>

      <section class="page" id="page-materials">
        <div class="page-head">
          <div>
            <h2>材料</h2>
            <p>零件、尺寸與數量。</p>
          </div>
        </div>
        <div class="ghost-panel">
          <div>
            <div class="empty-illustration" aria-hidden="true">
              <svg viewBox="0 0 160 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M32 24h70l26 24-26 24H32L58 48 32 24z" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                <path d="M58 48h70" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
                <circle cx="44" cy="48" r="5" fill="currentColor"/>
                <circle cx="100" cy="48" r="5" fill="currentColor"/>
              </svg>
            </div>
            <h3>下一刀補</h3>
            <p>材料輸入會接在這一頁。</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="statusbar">
      <div class="status-text" id="status">狀態：—</div>
      <button type="button" onclick="doExport(false)">存草稿</button>
      <button class="primary" type="button" onclick="doExport(true)">正式建立</button>
    </footer>
  </section>
</div>
<div id="toast"></div>

<script>
const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
const state = { series:'', date:today, reason:'', welds:[], photos:[], drawing_pdf:null, materials:[] };
const pageMeta = {
  basic:['基本資料','建立修改單的圖號、日期與原因'],
  welds:['焊口','從來源清單挑既有焊口，或新增原圖沒有的焊口'],
  files:['照片圖面','下一刀補'],
  materials:['材料','下一刀補']
};
const missingLabels = {
  missing_before_photo:'修改前照片',
  missing_after_photo:'修改後照片',
  missing_drawing_pdf:'圖面 PDF',
  missing_materials:'材料',
  missing_reason:'原因',
  missing_welds:'焊口'
};
let api=null;
let picked=null;
let connected=false;

window.addEventListener('pywebviewready', async ()=>{
  api = window.pywebview.api;
  byId('date').value = today;
  wireInputs();
  wireNav();
  try{
    const info = await call('info');
    connected = true;
    byId('connDot').classList.add('ok');
    byId('connectionText').textContent = `已連線 · API ${info.api_version}`;
  }catch(e){
    connected = false;
    byId('connectionText').textContent = '連線失敗';
  }
  syncNavStatus();
  await rebuild();
});

function byId(id){ return document.getElementById(id); }
function val(id){ return byId(id).value.trim(); }
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function wireInputs(){
  ['series','date','reason'].forEach(id=>{
    byId(id).addEventListener('input', ()=>{
      state[id==='series'?'series':id] = val(id);
      syncNavStatus();
      rebuild();
    });
  });
}

function wireNav(){
  document.querySelectorAll('.nav-step').forEach(btn=>{
    btn.addEventListener('click', ()=>showPage(btn.dataset.page));
  });
}

function showPage(name){
  document.querySelectorAll('.page').forEach(page=>page.classList.toggle('active', page.id === `page-${name}`));
  document.querySelectorAll('.nav-step').forEach(btn=>btn.classList.toggle('active', btn.dataset.page === name));
  byId('pageTitle').textContent = pageMeta[name][0];
  byId('pageHint').textContent = pageMeta[name][1];
}

async function call(method, ...args){
  if(!api){ throw new Error('API 尚未連線'); }
  const response = await api[method](...args);
  if(!response || response.ok !== true){
    const message = (response && response.error) || '呼叫失敗';
    toast(message, true);
    throw new Error(message);
  }
  return response.data;
}

function toast(message, isError=false){
  const el = byId('toast');
  el.textContent = message;
  el.style.background = isError ? 'var(--danger)' : 'var(--brand)';
  el.style.display = 'block';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(()=>{ el.style.display='none'; }, 3600);
}

function syncState(){
  state.series = val('series');
  state.date = val('date');
  state.reason = val('reason');
}

function syncNavStatus(){
  const series = val('series') || state.series || '—';
  byId('navStatus').textContent = `圖號 ${series} · ${connected ? '已連線' : '連線中'}`;
}

function updateHints(){
  const hasSeries = !!val('series');
  toggleHint(byId('series'), !hasSeries);
  toggleHint(byId('loadBtn'), hasSeries && state.welds.length === 0);
}
function toggleHint(el, on){ if(el){ el.classList.toggle('hint-pulse', !!on); } }

async function loadWelds(){
  syncState();
  syncNavStatus();
  const result = await call('existing_welds', state.series);
  picked = null;
  renderPickList(result.welds || []);
  showPage('welds');
  await rebuild();
}

function renderPickList(welds){
  const body = byId('pickList');
  byId('weldCount').textContent = welds.length ? `${welds.length} 筆` : '查無焊口';
  if(!welds.length){
    body.innerHTML = '<tr><td colspan="5" class="empty">這張圖號查無焊口</td></tr>';
    return;
  }
  body.innerHTML = '';
  welds.forEach(weld=>{
    const tr = document.createElement('tr');
    tr.className = 'pick';
    tr.innerHTML = `<td><code>${escapeHtml(weld.weld_no)}</code></td><td>${escapeHtml(weld.size)}</td><td>${escapeHtml(weld.material)}</td><td>${escapeHtml(weld.sch)}</td><td>${escapeHtml(weld.weld_type)}</td>`;
    tr.addEventListener('click', ()=>{
      picked = weld.weld_no;
      body.querySelectorAll('tr').forEach(row=>row.classList.remove('selected'));
      tr.classList.add('selected');
    });
    body.appendChild(tr);
  });
}

async function addExisting(){
  if(!picked){
    toast('先選一筆既有焊口', true);
    return;
  }
  state.welds.push({kind:'existing', base:picked, op:byId('exOp').value});
  await rebuild();
}

async function addNew(){
  state.welds.push({
    kind:'new',
    op:byId('nwOp').value,
    spec:{size:val('nwSize'), material:val('nwMat'), sch:val('nwSch'), weld_type:val('nwType')}
  });
  ['nwSize','nwMat','nwSch','nwType'].forEach(id=>byId(id).value='');
  await rebuild();
}

async function removeWeld(index){
  state.welds.splice(index,1);
  await rebuild();
}

async function rebuild(){
  if(!api){ return; }
  syncState();
  syncNavStatus();
  updateHints();
  let result;
  try{
    result = await call('build', state);
  }catch(e){
    return;
  }
  renderWeldRows((result.co && result.co.welds) || []);
  renderStatus(result.status, result.issues || []);
}

function renderWeldRows(welds){
  const body = byId('weldRows');
  if(!welds.length){
    body.innerHTML = `<tr><td colspan="6" class="empty">${emptyWeldState()}</td></tr>`;
    return;
  }
  body.innerHTML = '';
  welds.forEach((weld,index)=>{
    const spec = weld.spec || {};
    const detail = [spec.size, spec.sch, spec.material, spec.weld_type].filter(Boolean).join(' / ');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="weld-code">${escapeHtml(weld.code)}</span></td><td>${escapeHtml(weld.base)}</td><td>${escapeHtml(weld.op)}</td><td>${escapeHtml(detail)}</td><td>${escapeHtml(weld.spec_source)}</td><td><button class="sm" type="button" onclick="removeWeld(${index})">移除</button></td>`;
    body.appendChild(tr);
  });
}

function emptyWeldState(){
  return `<div class="empty-illustration" aria-hidden="true">
    <svg viewBox="0 0 160 96" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M28 58h37c10 0 18-8 18-18s8-18 18-18h31" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
      <path d="M28 74h44c11 0 20-9 20-20s9-20 20-20h20" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity=".55"/>
      <circle cx="84" cy="40" r="12" stroke="currentColor" stroke-width="5"/>
      <path d="M75 31l18 18M93 31L75 49" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>尚未加入焊口`;
}

function renderStatus(status, issues){
  const normalized = status || '—';
  const cls = normalized === '完整' ? 'ok' : 'warn';
  let html = `狀態：<span class="pill ${cls}">${escapeHtml(normalized)}</span>`;
  if(issues.length){
    html += `<span class="missing">還缺：${issues.map(issueLabel).join('、')}</span>`;
  }
  byId('status').innerHTML = html;
}

function issueLabel(issue){
  const code = issue && issue.code;
  return escapeHtml(missingLabels[code] || (issue && issue.message) || code || '未完成項目');
}

async function doExport(finalize){
  syncState();
  try{
    const result = await call('export', state, finalize);
    if(result.exported === false){
      const labels = (result.issues || []).map(issueLabel).join('、');
      toast(`正式建立被擋：${labels}`, true);
      renderStatus(result.status, result.issues || []);
      return;
    }
    toast(`${finalize ? '已正式建立' : '已存草稿'}：${result.id}`);
    byId('status').innerHTML = `已出單 <code>${escapeHtml(result.id)}</code>　${escapeHtml(result.folder)}`;
  }catch(e){}
}
</script>
</body>
</html>
